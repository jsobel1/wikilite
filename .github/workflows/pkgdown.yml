name: pkgdown

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: pkgdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            github::ropensci/rAltmetric
            local::.
          needs: website

      # Skip running examples on the reference index. The 0.2.0 CRAN
      # cleanup rewrapped network-bound examples from \dontrun{} (which
      # pkgdown skips by default) to \donttest{} (which pkgdown evaluates).
      # That made the reference build try to fetch Wikipedia / EuropePMC /
      # CrossRef for every exported function and we hit the 6h job limit.
      # The function signatures are documented in man/*.Rd; we don't need
      # actually-run example output for the site.
      - name: Build pkgdown site
        run: |
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install     = FALSE,
            examples    = FALSE
          )
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
