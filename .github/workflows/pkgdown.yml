name: pkgdown

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: pkgdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      # Cache knitr chunk output AND its rendered figures across runs.
      # Two prior bugs converged here:
      #   (1) caching only `vignettes/cache` left the figure PNGs out, so a
      #       cache-hit replay made pkgdown ENOENT on figure-html/cite-type-1.png.
      #   (2) keying only on .Rmd files meant changes to the package's R/
      #       source (which the vignettes call into) didn't bust the cache —
      #       cached chunks then disagreed with the newly-built package.
      # Now we cache both paths and key on R/, DESCRIPTION, and vignette source.
      - name: Cache knitr chunk output and figures
        uses: actions/cache@v4
        with:
          path: |
            vignettes/cache
            vignettes/*_files
          key: knitr-${{ runner.os }}-${{ hashFiles('vignettes/**/*.Rmd', 'R/**/*.R', 'DESCRIPTION') }}
          restore-keys: |
            knitr-${{ runner.os }}-

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
